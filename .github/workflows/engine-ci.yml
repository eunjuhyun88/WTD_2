name: Engine CI

on:
  pull_request:
    paths:
      - 'engine/**'
      - '.github/workflows/engine-ci.yml'
  push:
    paths:
      - 'engine/**'
      - '.github/workflows/engine-ci.yml'

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Engine Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest
