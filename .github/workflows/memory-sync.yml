name: Memory Sync

# PR이 main에 머지될 때마다 자동으로:
#   1. MemKraft에 PR 이벤트 기록
#   2. CURRENT.md main SHA 동기화
#   3. 변경사항을 protected main에 직접 push하지 않고 PR로 제안

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Memory + CURRENT.md
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'automation/memory-sync-pr-') &&
      !startsWith(github.event.pull_request.title, 'chore(memory):')
    runs-on: ubuntu-latest

    steps:
      - name: Detect memory sync token
        id: memory_token
        env:
          MEMORY_SYNC_TOKEN: ${{ secrets.MEMORY_SYNC_TOKEN }}
        run: |
          if [ -z "$MEMORY_SYNC_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MEMORY_SYNC_TOKEN is not configured; skipping memory sync PR creation."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        if: steps.memory_token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.MEMORY_SYNC_TOKEN }}

      - name: Setup Python
        if: steps.memory_token.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        if: steps.memory_token.outputs.available == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Sync engine dependencies
        if: steps.memory_token.outputs.available == 'true'
        run: uv sync --locked
        working-directory: engine

      - name: Run sync script
        if: steps.memory_token.outputs.available == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cd engine
          uv run python ../scripts/sync_memory.py \
            --pr-number "$PR_NUMBER" \
            --pr-title "$PR_TITLE" \
            --pr-body "$PR_BODY" \
            --sha "$MERGE_SHA" \
            --author "$AUTHOR"

      - name: Create memory sync pull request
        if: steps.memory_token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.MEMORY_SYNC_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          git config user.name "memory-sync[bot]"
          git config user.email "memory-sync@wtd-v2"
          git add memory/ work/active/CURRENT.md
          if git diff --cached --quiet; then
            echo "nothing to sync"
            exit 0
          fi

          branch="automation/memory-sync-pr-${PR_NUMBER}"
          git checkout -B "$branch"
          git commit -m "chore(memory): sync PR #${PR_NUMBER}"
          git push --force-with-lease origin "$branch"

          existing_pr="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')"
          body="Automated memory/CURRENT.md sync for merged PR #${PR_NUMBER}: ${PR_TITLE}"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "chore(memory): sync PR #${PR_NUMBER}" --body "$body"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(memory): sync PR #${PR_NUMBER}" \
              --body "$body"
          fi
