name: Contract CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate active agent state
        run: |
          if compgen -G "work/active/AGENT-HANDOFF-*.md" > /dev/null; then
            echo "Archive AGENT-HANDOFF files outside work/active; CURRENT.md is the live index."
            ls work/active/AGENT-HANDOFF-*.md
            exit 1
          fi

      - name: Run contract check
        run: ./scripts/contract-check.sh
