name: Worktree Cleanup Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-worktrees:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prune stale worktree refs
        run: git worktree prune

      - name: Check worktree count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(git worktree list | wc -l)
          echo "Worktree count: $COUNT"

          if [ "$COUNT" -gt 10 ]; then
            WORKTREES=$(git worktree list)
            echo "⚠️ Worktree count $COUNT exceeds limit of 10"

            # Check if an open issue already exists to avoid duplicates
            EXISTING=$(gh issue list --label maintenance --state open --search "Worktree count exceeded" --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "⚠️ Worktree count exceeded: ${COUNT} worktrees (limit: 10)" \
                --body "## Worktree Cleanup Required

**Current count**: ${COUNT} (limit: 10)

\`\`\`
${WORKTREES}
\`\`\`

### Cleanup steps
1. \`git worktree prune\` — remove stale refs
2. Identify and remove merged/abandoned branches
3. \`git worktree remove <path>\` for inactive worktrees

Auto-generated by [worktree-cleanup.yml](.github/workflows/worktree-cleanup.yml)" \
                --label "maintenance"
            else
              gh issue comment "$EXISTING" \
                --body "**Update $(date -u +%Y-%m-%dT%H:%M:%SZ)**: Count is still ${COUNT}.

\`\`\`
${WORKTREES}
\`\`\`"
            fi
          else
            echo "✅ Worktree count $COUNT is within limit"
          fi
