name: Update CURRENT.md SHA

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-sha:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CURRENT.md SHA
        run: |
          SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)
          # Update backtick-wrapped 8-char hex SHA on the "main SHA" line
          sed -i "s/\`[a-f0-9]\{8\}\` — origin\/main/\`${SHA:0:8}\` — origin\/main/" work/active/CURRENT.md
          # Update date in parentheses on the same line
          sed -i "s/(${DATE%%-*}-[0-9][0-9]-[0-9][0-9])/(${DATE})/" work/active/CURRENT.md || true

      - name: Commit SHA update
        run: |
          SHA=$(git rev-parse HEAD)
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add work/active/CURRENT.md
          git diff --staged --quiet || git commit -m "chore(auto): CURRENT.md SHA → ${SHA:0:8} [skip ci]"
          git push
