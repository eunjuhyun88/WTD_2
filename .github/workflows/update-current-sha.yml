name: Update main pointer (state branch)

on:
  push:
    branches: [main]

jobs:
  update-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: state
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write main_pointer.json
        run: |
          SHA="${{ github.sha }}"
          PR_NUM="${{ github.event.head_commit.message }}"
          cat > main_pointer.json <<EOF
          {
            "sha": "${SHA:0:8}",
            "full_sha": "$SHA",
            "message": "${{ github.event.head_commit.message }}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "source": "github-actions"
          }
          EOF

      - name: Push to state branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add main_pointer.json
          git diff --staged --quiet || git commit -m "state: main → ${{ github.sha && github.sha[:8] || 'update' }}"
          git push origin state
