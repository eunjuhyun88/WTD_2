name: Design Verify

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: design-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Design Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync engine dependencies
        run: uv sync
        working-directory: engine

      - name: Verify design invariants
        run: ./tools/verify_design.sh
