  G4_position_sizing:
    min_risk_pct: 1.0
    max_risk_pct: 2.5
    leverage_default: 2
    sizing_formula: risk_pct * equity / (entry - stop) / leverage
    vars_count: 14
    observed_risk_buckets:
    - <1%
    - 2-3%
    - 3-4%
    - 1-2%
