[project]
name = "cogochi-autoresearch"
version = "0.2.0"
description = "Shared models and feature calculators for the Cogochi LoRA pipeline (Track A) and the pattern-scanner swarm challenge (Track B)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pandas>=2.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    # --- API server ---
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    # --- ML ---
    "lightgbm>=4.3",
    "scikit-learn>=1.4",
    "scipy>=1.12",
    # --- Scheduling (background scanner) ---
    "apscheduler>=3.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", ".."]
