steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - engine/Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - engine

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_SERVICE_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - "1"
      - --update-env-vars
      - APP_ORIGIN=${_APP_ORIGIN},ENGINE_PORT=8000,ENGINE_RUNTIME_ROLE=api,ENGINE_ENABLE_SCHEDULER=false,ENGINE_ALLOWED_HOSTS=${_ALLOWED_HOSTS}

images:
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

substitutions:
  _AR_REGION: us-east4
  _AR_REPOSITORY: cloud-run-source-deploy
  _IMAGE_NAME: wtd-engine-api
  _SERVICE_NAME: cogotchi
  _SERVICE_REGION: asia-southeast1
  _APP_ORIGIN: https://app.cogotchi.dev
  _ALLOWED_HOSTS: cogotchi-3u7pi6ndna-as.a.run.app
