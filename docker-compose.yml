version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: wtd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wtd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wtd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine-api:
    build:
      context: .
      dockerfile: engine/Dockerfile
    container_name: wtd-engine-api
    restart: unless-stopped
    environment:
      ENGINE_PORT: 8000
      APP_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  app-web:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: wtd-app-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ENGINE_URL: http://engine-api:8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wtd
    ports:
      - "3000:3000"
    depends_on:
      engine-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

